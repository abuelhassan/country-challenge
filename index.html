<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Country Challenge — 15 Minutes</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f1117;
            color: #e8eaf0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: #161b27;
            border-bottom: 1px solid #252d40;
            flex-shrink: 0;
            gap: 16px;
        }

        #title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #7eb8f7;
            white-space: nowrap;
        }

        /* Timer */
        #timer {
            font-size: 2rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: #7eb8f7;
            min-width: 90px;
            text-align: center;
            transition: color .3s;
        }

        #timer.warning {
            color: #f4c150;
        }

        #timer.danger {
            color: #f46060;
            animation: pulse .6s infinite alternate;
        }

        @keyframes pulse {
            from {
                opacity: 1;
            }
            to {
                opacity: .5;
            }
        }

        /* Score */
        #score-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e2535;
            border-radius: 10px;
            padding: 6px 14px;
        }

        #score-label {
            font-size: .75rem;
            color: #8090b0;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        #score {
            font-size: 1.6rem;
            font-weight: 800;
            color: #6ee7b7;
            min-width: 2ch;
            text-align: center;
        }

        /* Input */
        #input-wrap {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 380px;
        }

        #country-input {
            flex: 1;
            padding: 8px 14px;
            border: 2px solid #2e3a55;
            border-radius: 8px;
            background: #1a2033;
            color: #e8eaf0;
            font-size: 1rem;
            outline: none;
            transition: border-color .2s;
        }

        #country-input:focus {
            border-color: #7eb8f7;
        }

        #country-input.correct {
            border-color: #6ee7b7;
            animation: flash-green .5s;
        }

        #country-input.wrong {
            border-color: #f46060;
            animation: shake .3s;
        }

        @keyframes flash-green {
            0%, 100% {
                background: #1a2033
            }
            40% {
                background: #1a3d2e
            }
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0)
            }
            25% {
                transform: translateX(-6px)
            }
            75% {
                transform: translateX(6px)
            }
        }

        #start-btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            background: #7eb8f7;
            color: #0f1117;
            font-weight: 700;
            font-size: .95rem;
            cursor: pointer;
            transition: background .2s, transform .1s;
            white-space: nowrap;
        }

        #start-btn:hover {
            background: #a8d4ff;
        }

        #start-btn:active {
            transform: scale(.96);
        }

        #start-btn:disabled {
            background: #2e3a55;
            color: #4a5570;
            cursor: default;
        }

        /* Feedback */
        #feedback {
            font-size: .85rem;
            min-width: 120px;
            text-align: left;
            height: 1.2em;
        }

        .fb-ok {
            color: #6ee7b7;
        }

        .fb-dup {
            color: #f4c150;
        }

        .fb-err {
            color: #f46060;
        }

        /* ── Main layout ── */
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Map ── */
        #map-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        #map-container svg {
            width: 100%;
            height: 100%;
        }

        .country-path {
            fill: #1e2d4a;
            stroke: #5a7aaa;
            stroke-width: .5px;
            transition: fill .4s;
            cursor: default;
        }

        .country-path.guessed {
            fill: #3a9e7a;
            stroke: #6ee7b7;
            stroke-width: .6px;
        }

        .country-path.guessed:hover {
            fill: #4abf93;
        }

        /* ── Sidebar ── */
        #sidebar {
            display: none;
        }

        #sidebar-header {
            padding: 10px 14px;
            font-size: .78rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #8090b0;
            border-bottom: 1px solid #252d40;
            flex-shrink: 0;
        }

        #guessed-list {
            overflow-y: auto;
            flex: 1;
            padding: 6px 4px;
        }

        #guessed-list::-webkit-scrollbar {
            width: 4px;
        }

        #guessed-list::-webkit-scrollbar-track {
            background: transparent;
        }

        #guessed-list::-webkit-scrollbar-thumb {
            background: #2e3a55;
            border-radius: 2px;
        }

        .guessed-item {
            padding: 5px 10px;
            font-size: .82rem;
            border-radius: 6px;
            color: #c0e8d0;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: slide-in .25s ease;
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }

        .guessed-item::before {
            content: '✓';
            color: #6ee7b7;
            font-weight: 700;
            font-size: .75rem;
        }

        .guessed-item:hover {
            background: #1e2535;
        }

        /* ── Overlay (start / end) ── */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 12, 20, .85);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #overlay.hidden {
            display: none;
        }

        #overlay-box {
            background: #161b27;
            border: 1px solid #2e3a55;
            border-radius: 18px;
            padding: 40px 48px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
        }

        #overlay-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: #7eb8f7;
        }

        #overlay-subtitle {
            color: #8090b0;
            margin-bottom: 28px;
            font-size: .95rem;
            line-height: 1.5;
        }

        #overlay-score {
            font-size: 3.5rem;
            font-weight: 900;
            color: #6ee7b7;
            line-height: 1;
            margin-bottom: 6px;
        }

        #overlay-score-label {
            font-size: .85rem;
            color: #8090b0;
            margin-bottom: 28px;
        }

        #overlay-btn {
            padding: 12px 36px;
            border: none;
            border-radius: 10px;
            background: #7eb8f7;
            color: #0f1117;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: background .2s, transform .1s;
        }

        #overlay-btn:hover {
            background: #a8d4ff;
        }

        #overlay-btn:active {
            transform: scale(.97);
        }

        /* Country labels on map */
        .country-label {
            font-size: 7px;
            fill: #e8f4e8;
            stroke: #0a1020;
            stroke-width: 2.5px;
            paint-order: stroke fill;
            pointer-events: none;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-weight: 700;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        /* tooltip */
        #tooltip {
            position: fixed;
            background: #1e2535;
            border: 1px solid #2e3a55;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: .78rem;
            color: #c0d4f0;
            pointer-events: none;
            display: none;
            z-index: 50;
        }
    </style>
</head>

    // ─── Game state ─────────────────────────────────────────────────────────────
    const TOTAL_SECONDS = 15 * 60;
    let secondsLeft = TOTAL_SECONDS;
    let timerInterval = null;
    let guessed = new Set(); // ids of guessed countries
    let gameActive = false;
    let timerStarted = false;
    let pathMap = new Map();     // alpha-3 id → SVG path element
    let featuresMap = new Map(); // alpha-3 id → GeoJSON feature

    // ─── DOM refs ────────────────────────────────────────────────────────────────
    const timerEl = document.getElementById('timer');
    const scoreEl = document.getElementById('score');
    const inputEl = document.getElementById('country-input');
    const feedbackEl = document.getElementById('feedback');
    const listEl = document.getElementById('guessed-list');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.querySelector('#overlay-box #overlay-title');
    const overlaySubtitle = document.querySelector('#overlay-box #overlay-subtitle');
    const overlayScore = document.querySelector('#overlay-box #overlay-score');
    const overlayScoreLabel = document.querySelector('#overlay-box #overlay-score-label');
    const overlayBtn = document.getElementById('overlay-btn');
    const tooltip = document.getElementById('tooltip');

    // ─── Map setup (D3 + TopoJSON) ───────────────────────────────────────────────
    const container = document.getElementById('map-container');
    const svg = d3.select(container).append('svg');
    const g = svg.append('g');

    const projection = d3.geoNaturalEarth1().rotate([-30, 0]);
    const path = d3.geoPath().projection(projection);

    // Zoom behaviour
    const zoom = d3.zoom()
        .scaleExtent([1, 12])
        .on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoom);

    function fitMap() {
        const w = container.clientWidth;
        const h = container.clientHeight;
        svg.attr('viewBox', `0 0 ${w} ${h}`);
        projection.fitSize([w, h], {type: 'Sphere'});
        path.projection(projection);
        g.selectAll('.country-path').attr('d', path);
        g.selectAll('.graticule').attr('d', path);
        g.selectAll('.sphere').attr('d', path);
        g.selectAll('.country-label').each(function() {
            const id = d3.select(this).attr('data-id');
            const feature = featuresMap.get(id);
            if (feature) {
                const c = path.centroid(feature);
                if (!isNaN(c[0])) d3.select(this).attr('x', c[0]).attr('y', c[1]);
            }
        });
    }

    // Build reverse lookup: alpha-3 id → country (for tooltip)
    const idLookup = new Map();
    COUNTRIES.forEach(c => idLookup.set(c.id, c));

    // Load world GeoJSON
    fetch('countries_merged.geojson')
        .then(r => r.json())
        .then(world => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            svg.attr('viewBox', `0 0 ${w} ${h}`);
            projection.fitSize([w, h], {type: 'Sphere'});

            // Ocean
            g.append('path')
                .datum({type: 'Sphere'})
                .attr('class', 'sphere')
                .attr('d', path)
                .attr('fill', '#0d1929');

            // Graticule
            g.append('path')
                .datum(d3.geoGraticule()())
                .attr('class', 'graticule')
                .attr('d', path)
                .attr('fill', 'none')
                .attr('stroke', '#162033')
                .attr('stroke-width', .3);

            // Countries
            const features = world.features;
            g.selectAll('.country-path')
                .data(features)
                .join('path')
                .attr('class', 'country-path')
                .attr('d', path)
                .attr('id', d => `c-${d.id}`)
                .on('mousemove', (e, d) => {
                    const country = idLookup.get(d.id);
                    if (country && guessed.has(country.id)) {
                        tooltip.style.display = 'block';
                        tooltip.style.left = (e.clientX + 12) + 'px';
                        tooltip.style.top = (e.clientY - 24) + 'px';
                        tooltip.textContent = country.name;
                    }
                })
                .on('mouseleave', () => {
                    tooltip.style.display = 'none';
                });

            // Build path map and features map
            features.forEach(f => {
                const el = document.getElementById(`c-${f.id}`);
                if (el) pathMap.set(f.id, el);
                featuresMap.set(f.id, f);
            });

            // Enable input once map is ready
            gameActive = true;
            inputEl.disabled = false;
            inputEl.focus();
        })
        .catch(() => {
            overlaySubtitle.textContent = 'Failed to load map. Check your internet connection and refresh.';
        });

    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(fitMap, 150);
    });

    // ─── Timer ───────────────────────────────────────────────────────────────────
    function updateTimer() {
        const m = Math.floor(secondsLeft / 60);
        const s = secondsLeft % 60;
        timerEl.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        timerEl.className = secondsLeft <= 60 ? 'danger' : secondsLeft <= 180 ? 'warning' : '';
        if (secondsLeft <= 0) endGame();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            secondsLeft--;
            updateTimer();
        }, 1000);
    }

    // ─── Game logic ──────────────────────────────────────────────────────────────
    function resetGame() {
        clearInterval(timerInterval);
        timerInterval = null;
        guessed.clear();
        secondsLeft = TOTAL_SECONDS;
        gameActive = true;
        timerStarted = false;
        g.selectAll('.country-label').remove();
        scoreEl.textContent = '0';
        updateTimer();
        overlay.classList.add('hidden');
        // Reset all highlighted countries
        pathMap.forEach(el => el.classList.remove('guessed'));
        inputEl.disabled = false;
        inputEl.focus();
    }

    function endGame() {
        clearInterval(timerInterval);
        gameActive = false;
        inputEl.disabled = true;
        overlay.classList.remove('hidden');

        overlayTitle.textContent = 'Time\'s Up!';
        overlaySubtitle.textContent = `You named ${guessed.size} out of ${COUNTRIES.length} countries.`;
        overlayScore.textContent = guessed.size;
        overlayScoreLabel.textContent = `/ ${COUNTRIES.length} countries`;
    }

    function setFeedback(msg, cls) {
        feedbackEl.textContent = msg;
        feedbackEl.className = cls;
        clearTimeout(feedbackEl._t);
        feedbackEl._t = setTimeout(() => {
            feedbackEl.textContent = '';
            feedbackEl.className = '';
        }, 1500);
    }

    function guess(raw) {
        const key = norm(raw);
        if (!key) return;
        const country = lookup.get(key);
        if (!country) {
            setFeedback('Not found', 'fb-err');
            inputEl.classList.add('wrong');
            setTimeout(() => inputEl.classList.remove('wrong'), 400);
            return;
        }
        if (guessed.has(country.id)) {
            setFeedback('Already got it!', 'fb-dup');
            return;
        }
        // Correct!
        if (!timerStarted) {
            timerStarted = true;
            startTimer();
        }
        guessed.add(country.id);
        scoreEl.textContent = guessed.size;
        setFeedback(`✓ ${country.name}`, 'fb-ok');
        inputEl.classList.add('correct');
        setTimeout(() => inputEl.classList.remove('correct'), 500);

        // Highlight on map
        const el = pathMap.get(country.id);
        if (el) el.classList.add('guessed');

        // Add label on map
        const feature = featuresMap.get(country.id);
        if (feature) {
            const c = path.centroid(feature);
            if (!isNaN(c[0])) {
                g.append('text')
                    .attr('class', 'country-label')
                    .attr('data-id', country.id)
                    .attr('x', c[0])
                    .attr('y', c[1])
                    .text(country.name);
            }
        }
    }

    // ─── Events ──────────────────────────────────────────────────────────────────
    inputEl.addEventListener('keydown', e => {
        if (e.key === 'Enter' && gameActive) {
            const val = inputEl.value;
            guess(val);
            inputEl.value = '';
            e.preventDefault();
        }
    });

    overlayBtn.addEventListener('click', () => {
        overlayBtn.disabled = true;
        startGame();
    });

    startBtn.addEventListener('click', () => {
        overlay.classList.remove('hidden');
        overlayTitle.textContent = 'Country Challenge';
        overlaySubtitle.innerHTML = `You have <strong>15 minutes</strong> to name as many countries as possible.<br>Type a country name and press <strong>Enter</strong>.`;
        overlayScore.style.display = 'none';
        overlayScoreLabel.style.display = 'none';
        overlayBtn.textContent = 'Start Game';
        overlayBtn.disabled = false;
    });
</script>
</body>
</html>
